<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Operations Dashboard - Avina Therapy</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #1e293b; line-height: 1.5; padding: 24px; }
    .container { max-width: 1000px; margin: 0 auto; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    h1 { font-size: 20px; color: #0f172a; }
    .refresh-info { font-size: 12px; color: #94a3b8; text-align: right; }
    .refresh-info .data-as-of { font-weight: 600; color: #475569; }
    .refresh-info .checked-at { display: block; font-size: 11px; margin-top: 2px; }
    .refresh-info.stale .data-as-of { color: #d97706; }
    .signin-box { text-align: center; padding: 60px 20px; }
    .signin-box button { background: #0f172a; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .kpi-card { background: white; border-radius: 10px; padding: 14px 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
    .kpi-card.clickable { cursor: pointer; transition: box-shadow 0.15s; }
    .kpi-card.clickable:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .kpi-card.active { outline: 2px solid #dc2626; }
    .kpi-card .chevron-inline { font-size: 9px; color: #94a3b8; }
    .kpi-card .kpi-hint { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .kpi-card .label { font-size: 12px; color: #64748b; margin-bottom: 4px; }
    .kpi-card .value { font-size: 22px; font-weight: 700; }
    .agent-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .agent-card { background: white; border-radius: 10px; padding: 14px 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); cursor: pointer; transition: box-shadow 0.15s; }
    .agent-card:hover:not(.no-data) { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .agent-card.no-data { opacity: 0.55; cursor: default; }
    .agent-card.expanded { box-shadow: 0 2px 8px rgba(0,0,0,0.1); outline: 2px solid #0f172a; }
    .agent-card .name { font-size: 13px; font-weight: 600; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
    .agent-card .chevron { font-size: 11px; color: #94a3b8; transition: transform 0.15s; }
    .agent-card.expanded .chevron { transform: rotate(180deg); }
    .agent-card .score { font-size: 24px; font-weight: 700; margin-bottom: 2px; }
    .agent-card .sub { font-size: 12px; color: #64748b; }
    .detail-panel { background: white; border-radius: 10px; padding: 16px 20px; margin-bottom: 24px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
    .detail-panel-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: #0f172a; }
    .finding-detail { border-left: 4px solid #cbd5e1; border-radius: 6px; padding: 12px 14px; margin-bottom: 10px; background: #f8fafc; }
    .finding-detail.critical { border-left-color: #dc2626; }
    .finding-detail.high { border-left-color: #ea580c; }
    .finding-detail.medium { border-left-color: #d97706; }
    .finding-detail.low { border-left-color: #65a30d; }
    .finding-detail-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .finding-badge { color: white; font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; }
    .finding-category { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.03em; }
    .finding-detail h4 { font-size: 13px; margin-bottom: 6px; color: #0f172a; }
    .finding-detail .fd-text { font-size: 13px; color: #475569; margin-bottom: 6px; }
    .finding-detail .fd-rec { font-size: 13px; color: #334155; background: white; padding: 8px 10px; border-radius: 6px; }
    .chart-wrap { background: white; border-radius: 10px; padding: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); margin-bottom: 20px; }
    .legend { display: flex; gap: 16px; margin-bottom: 10px; font-size: 12px; color: #64748b; }
    .legend span { display: flex; align-items: center; gap: 4px; }
    .dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
    .action-panel { background: white; border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); border: 1px solid #fecaca; }
    .action-panel-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; color: #0f172a; display: flex; align-items: center; gap: 8px; }
    .action-panel-sub { font-size: 12px; color: #64748b; margin-bottom: 14px; }
    .action-item { border-left: 4px solid #cbd5e1; border-radius: 6px; padding: 12px 14px; margin-bottom: 10px; background: #f8fafc; }
    .action-item.critical { border-left-color: #dc2626; background: #fef2f2; }
    .action-item.high { border-left-color: #ea580c; background: #fff7ed; }
    .action-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .action-item h4 { font-size: 13px; margin-bottom: 6px; color: #0f172a; }
    .action-item .ai-text { font-size: 13px; color: #475569; margin-bottom: 6px; }
    .action-item .ai-rec { font-size: 13px; color: #334155; background: white; padding: 8px 10px; border-radius: 6px; }
    .agent-tag { font-size: 10px; color: #64748b; background: #e2e8f0; padding: 2px 8px; border-radius: 20px; }
    .all-clear { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; font-size: 13px; color: #166534; display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>
<div class="container">
    <div class="header-row">
        <h1>IT Operations Dashboard</h1>
        <span class="refresh-info" id="refreshInfo">Not loaded</span>
    </div>

    <div id="signinBox" class="signin-box">
        <button id="signinBtn">Sign in with Microsoft to load dashboard</button>
    </div>

    <div id="dashboardContent" style="display:none;">
        <div id="errorBox"></div>
        <div class="chart-wrap">
            <div class="legend">
                <span><span class="dot" style="background:#e34948"></span>Critical</span>
                <span><span class="dot" style="background:#eb6834"></span>High</span>
                <span><span class="dot" style="background:#eda100"></span>Medium</span>
            </div>
            <div style="position:relative;height:220px;">
                <canvas id="findingsChart"></canvas>
            </div>
        </div>
        <div class="kpi-row" id="kpiRow"></div>
        <div id="actionItemsPanel"></div>
        <div class="agent-grid" id="agentGrid"></div>
        <div id="detailPanel"></div>
    </div>
</div>

<script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ============================================================
// CONFIG - fill these in for your tenant before deploying
// ============================================================
const CONFIG = {
    clientId: "d02c6402-0056-4d27-bd76-43b0e05c848f",       // App registration (SPA platform, public client)
    tenantId: "avinatherapy.onmicrosoft.com",
    redirectUri: window.location.origin + window.location.pathname,  // origin alone drops the /repo-name/ path on GitHub Pages
    siteHostname: "avinatherapy.sharepoint.com",
    sitePath: "",                                          // Vibe is at the tenant root, not a /sites/ subsite
    listName: "AgentFindings",
    agentOrder: ["Tenant Health", "Compliance Register", "Change Comms", "Vendor Contracts", "Documentation"]
};

const msalConfig = {
    auth: {
        clientId: CONFIG.clientId,
        authority: `https://login.microsoftonline.com/${CONFIG.tenantId}`,
        redirectUri: CONFIG.redirectUri
    }
};
const msalInstance = new msal.PublicClientApplication(msalConfig);
const GRAPH_SCOPES = ["Sites.Read.All"];

document.getElementById("signinBtn").addEventListener("click", async () => {
    try {
        await msalInstance.loginPopup({ scopes: GRAPH_SCOPES });
        await loadDashboard();
    } catch (err) {
        showError("Sign-in failed: " + err.message);
    }
});

// Attempt silent load if already signed in
window.addEventListener("load", async () => {
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
        msalInstance.setActiveAccount(accounts[0]);
        await loadDashboard();
    }
});

function showError(msg) {
    document.getElementById("errorBox").innerHTML = `<div class="error-box">${msg}</div>`;
}

async function getGraphToken() {
    const account = msalInstance.getActiveAccount() || msalInstance.getAllAccounts()[0];
    const result = await msalInstance.acquireTokenSilent({ scopes: GRAPH_SCOPES, account });
    return result.accessToken;
}

async function graphGet(url) {
    const token = await getGraphToken();
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) throw new Error(`Graph request failed (${res.status}): ${url}`);
    return res.json();
}

async function loadDashboard() {
    document.getElementById("signinBox").style.display = "none";
    document.getElementById("dashboardContent").style.display = "block";

    try {
        // Resolve site ID, then list ID, then items with fields expanded.
        // Graph's root-site lookup is /sites/{hostname} with no colon suffix -
        // the colon:path form is only for actual subsites.
        const siteUrl = CONFIG.sitePath
            ? `https://graph.microsoft.com/v1.0/sites/${CONFIG.siteHostname}:${CONFIG.sitePath}`
            : `https://graph.microsoft.com/v1.0/sites/${CONFIG.siteHostname}`;
        const site = await graphGet(siteUrl);
        const lists = await graphGet(
            `https://graph.microsoft.com/v1.0/sites/${site.id}/lists?$filter=displayName eq '${CONFIG.listName}'`
        );
        if (!lists.value.length) throw new Error(`List '${CONFIG.listName}' not found on site.`);
        const listId = lists.value[0].id;

        let items = [];
        let url = `https://graph.microsoft.com/v1.0/sites/${site.id}/lists/${listId}/items?expand=fields&$top=200`;
        while (url) {
            const page = await graphGet(url);
            items = items.concat(page.value);
            url = page["@odata.nextLink"] || null;
        }

        const findings = items
            .map(i => i.fields)
            .filter(f => f.Status === "Open");

        renderDashboard(findings);
        renderRefreshInfo(findings);
    } catch (err) {
        showError("Could not load dashboard data: " + err.message);
    }
}

function renderRefreshInfo(findings) {
    const el = document.getElementById("refreshInfo");
    const checkedAt = new Date().toLocaleString();

    if (findings.length === 0) {
        el.innerHTML = `<span class="checked-at">Checked ${escapeHtml(checkedAt)} - no findings recorded yet</span>`;
        return;
    }

    // LastSeen gets touched on every agent run for every currently-open finding,
    // so the most recent one across all findings tells us when data was
    // genuinely last refreshed by the scheduled task - not just when this
    // page happened to load. A page-load timestamp alone would misleadingly
    // say "just now" even if the underlying weekly run silently stopped working.
    const lastSeenDates = findings
        .map(f => f.LastSeen ? new Date(f.LastSeen) : null)
        .filter(d => d && !isNaN(d));

    if (lastSeenDates.length === 0) {
        el.innerHTML = `<span class="checked-at">Checked ${escapeHtml(checkedAt)} - no run timestamp available on findings</span>`;
        return;
    }

    const mostRecent = new Date(Math.max(...lastSeenDates));
    const daysSince = Math.floor((Date.now() - mostRecent.getTime()) / (1000 * 60 * 60 * 24));
    const isStale = daysSince > 9;  // weekly schedule + a couple days' slack

    el.classList.toggle("stale", isStale);
    el.innerHTML = `
        <span class="data-as-of">Data as of: ${escapeHtml(mostRecent.toLocaleString())}${isStale ? ` (${daysSince} days ago - check the scheduled task)` : ''}</span>
        <span class="checked-at">Page checked: ${escapeHtml(checkedAt)}</span>
    `;
}

function escapeHtml(str) {
    if (str === null || str === undefined) return "";
    return String(str)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

let _expandedAgent = null;

function toggleAgentDetail(name, hasData) {
    if (!hasData) return;
    _expandedAgent = (_expandedAgent === name) ? null : name;
    renderAgentGrid();
    renderDetailPanel();
}

function renderAgentGrid() {
    document.getElementById("agentGrid").innerHTML = CONFIG.agentOrder.map(name => {
        const s = window._agentStats[name] || { Critical: 0, High: 0, Medium: 0, total: 0 };
        const noRun = !(name in window._agentStats) || (s.total === 0 && s.Critical === 0 && s.High === 0 && s.Medium === 0);
        const color = s.Critical > 0 ? "#dc2626" : s.High > 0 ? "#ea580c" : s.Medium > 0 ? "#d97706" : "#16a34a";
        const isExpanded = _expandedAgent === name;
        return `
            <div class="agent-card ${noRun ? 'no-data' : ''} ${isExpanded ? 'expanded' : ''}" data-agent="${escapeHtml(name)}" data-has-data="${!noRun}">
                <div class="name">${escapeHtml(name)} ${noRun ? '' : `<span class="chevron">&#9662;</span>`}</div>
                ${noRun
                    ? `<div class="sub">No data yet - agent not built or hasn't run</div>`
                    : `<div class="score" style="color:${color}">${s.total}</div><div class="sub">open findings - click for detail</div>`
                }
            </div>`;
    }).join("");

    document.querySelectorAll(".agent-card").forEach(card => {
        card.addEventListener("click", () => {
            toggleAgentDetail(card.dataset.agent, card.dataset.hasData === "true");
        });
    });
}

function renderDetailPanel() {
    const panel = document.getElementById("detailPanel");
    if (!_expandedAgent) { panel.innerHTML = ""; return; }

    const items = (window._allFindings || []).filter(f => f.AgentName === _expandedAgent);
    const severityOrder = { Critical: 0, High: 1, Medium: 2, Low: 3 };
    items.sort((a, b) => (severityOrder[a.Severity] ?? 9) - (severityOrder[b.Severity] ?? 9));

    panel.innerHTML = `
        <div class="detail-panel">
            <div class="detail-panel-title">${escapeHtml(_expandedAgent)} - ${items.length} open finding${items.length !== 1 ? 's' : ''}</div>
            ${items.map(f => `
                <div class="finding-detail ${(f.Severity || '').toLowerCase()}">
                    <div class="finding-detail-header">
                        <span class="finding-badge" style="background:${
                            f.Severity === 'Critical' ? '#dc2626' : f.Severity === 'High' ? '#ea580c' : f.Severity === 'Medium' ? '#d97706' : '#65a30d'
                        }">${escapeHtml(f.Severity)}</span>
                        <span class="finding-category">${escapeHtml(f.Category)}</span>
                    </div>
                    <h4>${escapeHtml(f.Title)}</h4>
                    <div class="fd-text">${escapeHtml(f.Detail)}</div>
                    <div class="fd-rec"><strong>Recommendation:</strong> ${escapeHtml(f.Recommendation)}</div>
                </div>
            `).join("")}
        </div>`;
}

let _actionItemsVisible = false;

function toggleActionItems() {
    _actionItemsVisible = !_actionItemsVisible;
    renderActionItems(window._allFindings || []);
    renderKpiRow();
}

function renderActionItems(findings) {
    const panel = document.getElementById("actionItemsPanel");
    const urgent = findings
        .filter(f => f.Severity === "Critical" || f.Severity === "High")
        .sort((a, b) => (a.Severity === "Critical" ? 0 : 1) - (b.Severity === "Critical" ? 0 : 1));

    if (!_actionItemsVisible) { panel.innerHTML = ""; return; }

    if (urgent.length === 0) {
        panel.innerHTML = `<div class="all-clear">&#9989; No Critical or High priority items right now - everything reporting is within acceptable thresholds.</div>`;
        return;
    }

    panel.innerHTML = `
        <div class="action-panel">
            <div class="action-panel-title">&#9888;&#65039; Action Items - fix these first</div>
            <div class="action-panel-sub">${urgent.length} item${urgent.length !== 1 ? 's' : ''} against best-practice configuration, ranked worst first. This is everything that needs a decision - not just a count.</div>
            ${urgent.map(f => `
                <div class="action-item ${f.Severity.toLowerCase()}">
                    <div class="action-item-header">
                        <span class="finding-badge" style="background:${f.Severity === 'Critical' ? '#dc2626' : '#ea580c'}">${escapeHtml(f.Severity)}</span>
                        <span class="agent-tag">${escapeHtml(f.AgentName)}</span>
                        <span class="finding-category">${escapeHtml(f.Category)}</span>
                    </div>
                    <h4>${escapeHtml(f.Title)}</h4>
                    <div class="ai-text">${escapeHtml(f.Detail)}</div>
                    <div class="ai-rec"><strong>Fix:</strong> ${escapeHtml(f.Recommendation)}</div>
                </div>
            `).join("")}
        </div>`;
}

function renderKpiRow() {
    const findings = window._allFindings || [];
    const bySeverity = { Critical: 0, High: 0, Medium: 0, Low: 0 };
    findings.forEach(f => { if (bySeverity[f.Severity] !== undefined) bySeverity[f.Severity]++; });
    const criticalHigh = bySeverity.Critical + bySeverity.High;
    const agentStats = window._agentStats || {};

    document.getElementById("kpiRow").innerHTML = `
        <div class="kpi-card"><div class="label">Open findings</div><div class="value">${findings.length}</div></div>
        <div class="kpi-card clickable ${_actionItemsVisible ? 'active' : ''}" id="criticalHighCard"><div class="label">Critical / High <span class="chevron-inline">${_actionItemsVisible ? '&#9662;' : '&#9656;'}</span></div><div class="value" style="color:${criticalHigh > 0 ? '#dc2626' : '#16a34a'}">${criticalHigh}</div><div class="kpi-hint">${criticalHigh > 0 ? 'click to ' + (_actionItemsVisible ? 'hide' : 'view') : ''}</div></div>
        <div class="kpi-card"><div class="label">Medium</div><div class="value">${bySeverity.Medium}</div></div>
        <div class="kpi-card"><div class="label">Agents reporting</div><div class="value">${Object.values(agentStats).filter(a => a.total > 0).length} / ${CONFIG.agentOrder.length}</div></div>
    `;

    const card = document.getElementById("criticalHighCard");
    if (card && criticalHigh > 0) {
        card.addEventListener("click", toggleActionItems);
    }
}

function renderDashboard(findings) {
    window._allFindings = findings;  // keep raw findings for the click-to-expand detail panel

    const agentStats = {};
    CONFIG.agentOrder.forEach(name => {
        agentStats[name] = { Critical: 0, High: 0, Medium: 0, Low: 0, total: 0 };
    });
    findings.forEach(f => {
        if (!agentStats[f.AgentName]) agentStats[f.AgentName] = { Critical: 0, High: 0, Medium: 0, Low: 0, total: 0 };
        if (agentStats[f.AgentName][f.Severity] !== undefined) agentStats[f.AgentName][f.Severity]++;
        agentStats[f.AgentName].total++;
    });
    window._agentStats = agentStats;  // keep for renderAgentGrid on toggle

    renderKpiRow();
    renderActionItems(findings);
    renderAgentGrid();
    renderDetailPanel();  // re-render in case an agent was already expanded from a prior refresh

    const ctx = document.getElementById("findingsChart");
    if (window._findingsChartInstance) window._findingsChartInstance.destroy();
    window._findingsChartInstance = new Chart(ctx, {
        type: "bar",
        data: {
            labels: CONFIG.agentOrder,
            datasets: [
                { label: "Critical", data: CONFIG.agentOrder.map(n => agentStats[n]?.Critical || 0), backgroundColor: "#e34948", stack: "s" },
                { label: "High", data: CONFIG.agentOrder.map(n => agentStats[n]?.High || 0), backgroundColor: "#eb6834", stack: "s" },
                { label: "Medium", data: CONFIG.agentOrder.map(n => agentStats[n]?.Medium || 0), backgroundColor: "#eda100", stack: "s" }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { stacked: true, grid: { display: false } },
                y: { stacked: true, beginAtZero: true, ticks: { precision: 0 } }
            }
        }
    });
}
</script>
</body>
</html>
